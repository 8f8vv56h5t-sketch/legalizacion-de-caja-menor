services:
  - type: web
    name: legalizacion-caja-menor
    runtime: docker
    plan: starter
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: ONEDRIVE_ENABLED
        value: "false"
      - key: ONEDRIVE_REQUIRED
        value: "false"
      - key: ONEDRIVE_BASE_PATH
        value: LegalizacionesCajaMenor
    disk:
      name: legalizaciones-data
      mountPath: /data
      sizeGB: 10

services:
  - type: web
    name: legalizacion-caja-menor
    runtime: docker
    plan: starter
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: ONEDRIVE_ENABLED
        sync: false
      - key: ONEDRIVE_REQUIRED
        sync: false
      - key: ONEDRIVE_TENANT_ID
        sync: false
      - key: ONEDRIVE_CLIENT_ID
        sync: false
      - key: ONEDRIVE_CLIENT_SECRET
        sync: false
      - key: ONEDRIVE_DRIVE_ID
        sync: false
      - key: ONEDRIVE_BASE_PATH
        value: LegalizacionesCajaMenor
      - key: ALERT_EMAIL_ENABLED
        value: "true"
      - key: ALERT_EMAIL_REQUIRED
        value: "false"
      - key: ALERT_EMAIL_TO
        value: contabilidad@engeikos.com.co
      - key: ALERT_EMAIL_FROM
        sync: false
      - key: ALERT_EMAIL_SUBJECT_PREFIX
        value: "[Caja menor]"
      - key: SMTP_HOST
        value: smtp.office365.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
    disk:
      name: legalizaciones-data
      mountPath: /data
      sizeGB: 10
